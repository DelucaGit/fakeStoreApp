spring.application.name=userOrderService

# Server configuration
server.port=8080

# Database connection
# Ensure these environment variables are configured in IntelliJ,
# otherwise, you can temporarily hardcode the exact values here.
spring.datasource.url=${DB_URL_LOCAL}
spring.datasource.username=${DB_USERNAME_LOCAL}
spring.datasource.password=${DB_PASSWORD_LOCAL}

# 1. DATABASE-FIRST SETTINGS
# Enables Flyway to manage database migrations.
spring.flyway.enabled=true

# Forces Hibernate to verify that your @Entity classes
# perfectly match the existing tables in the database.
# If they do not match, the application will fail to start.
spring.jpa.hibernate.ddl-auto=validate

# 2. NAMING STRATEGY (Crucial for Database-First)
# Automatically maps Java camelCase properties (e.g., firstName)
# to SQL snake_case columns (e.g., first_name).
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# 3. LOGGING & DEBUGGING
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jpa=INFO

# API Endpoints
auth.endpoint.register = ${AUTH_ENDPOINT_REGISTER} 